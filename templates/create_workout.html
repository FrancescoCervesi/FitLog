{% extends 'base.html' %}
{% block title %}Nuovo allenamento — FitLog{% endblock %}
{% block content %}
<div class="row">
  <div class="col-lg-7 mx-auto">
    <h1 class="mb-4">Nuovo allenamento</h1>
    <div class="card p-4">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-bold">Nome dell'allenamento</label>
          <input type="text" name="name" class="form-control form-control-lg" placeholder="Es. Petto e Tricipiti" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Data</label>
          <input type="date" name="workout_date" class="form-control" value="{{ oggi }}">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Note (facoltative)</label>
          <textarea name="notes" class="form-control" rows="3" placeholder="Sensazioni, obiettivi, ecc."></textarea>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Crea e aggiungi esercizi</button>
          <a href="{{ url_for('main.workouts') }}" class="btn btn-outline-secondary">Annulla</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
