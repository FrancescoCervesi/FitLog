{% extends 'base.html' %}
{% block title %}Registrati — FitLog{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h2 class="text-center mb-4">Crea il tuo account</h2>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password (almeno 6 caratteri)</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Conferma password</label>
          <input type="password" name="confirm_password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Registrati</button>
      </form>
      <hr>
      <p class="text-center mb-0 text-muted">Hai già un account? <a href="{{ url_for('main.login') }}">Accedi</a></p>
    </div>
  </div>
</div>
{% endblock %}
