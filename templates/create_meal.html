{% extends 'base.html' %}
{% block title %}Registra pasto — FitLog{% endblock %}
{% block content %}
<div class="row">
  <div class="col-lg-7 mx-auto">
    <h1 class="mb-4">Registra un pasto</h1>
    <div class="card p-4">
      <form method="POST">
        <div class="row g-3">
          <div class="col-md-8">
            <label class="form-label fw-bold">Nome del pasto / alimento</label>
            <input type="text" name="name" class="form-control" placeholder="Es. Pollo con riso" required autofocus>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-bold">Tipo</label>
            <select name="meal_type" class="form-select">
              <option value="colazione">Colazione</option>
              <option value="pranzo" selected>Pranzo</option>
              <option value="cena">Cena</option>
              <option value="spuntino">Spuntino</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Data</label>
            <input type="date" name="meal_date" class="form-control" value="{{ oggi }}">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Calorie (kcal)</label>
            <input type="number" name="calories" class="form-control" value="0" min="0">
          </div>
          <div class="col-md-4">
            <label class="form-label">Proteine (g)</label>
            <input type="number" name="protein" class="form-control" value="0" min="0" step="0.1">
          </div>
          <div class="col-md-4">
            <label class="form-label">Carboidrati (g)</label>
            <input type="number" name="carbs" class="form-control" value="0" min="0" step="0.1">
          </div>
          <div class="col-md-4">
            <label class="form-label">Grassi (g)</label>
            <input type="number" name="fat" class="form-control" value="0" min="0" step="0.1">
          </div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-accent">Salva pasto</button>
          <a href="{{ url_for('main.nutrition') }}" class="btn btn-outline-secondary">Annulla</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
